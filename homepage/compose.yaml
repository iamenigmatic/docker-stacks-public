services:
  homepage:
    container_name: Homepage
    image: gethomepage/homepage:latest
    mem_limit: 4g
    cpu_shares: 768
    security_opt:
      - no-new-privileges:true
    environment:
      HOMEPAGE_ALLOWED_HOSTS: 192.168.0.14:3550  # Use your own. You can also add your synology.me DDNS or other domain separated by comma like 192.168.1.18:3550,homepage.yourname.synology.me
      PUID: 1026  # Use your own
      PGID: 100  # Use your own
    ports:
      - 3550:3000
    volumes:
      - /volume1/docker/homepage:/app/config:rw
      - /volume1/docker/homepage/public:/app/public/images:rw
      - /var/run/docker.sock:/var/run/docker.sock
    restart: on-failure:5
    networks:
      - group1

networks:
  group1:
    external: true  # Use an existing network