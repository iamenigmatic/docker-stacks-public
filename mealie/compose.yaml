services:
  db:
    image: postgres:17
    container_name: Mealie-DB
    hostname: mealie-db
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "mealie", "-U", "mealieuser"]
      timeout: 45s
      interval: 10s
      retries: 10
    volumes:
      - /volume1/docker/mealie/db:/var/lib/postgresql/data:rw
    environment:
      POSTGRES_DB: mealie
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    restart: on-failure:5
    networks:
      - group1

  mealie:
    image: ghcr.io/mealie-recipes/mealie:latest
    container_name: Mealie
    hostname: mealie
    security_opt:
      - no-new-privileges:true
    read_only: false
    healthcheck:
      test: timeout 10s bash -c ':> /dev/tcp/127.0.0.1/9000' || exit 1
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 90s  
    ports:
      - 9925:9000
    volumes:
      - /volume1/docker/mealie/data:/app/data/:rw
    environment:
      TZ: America/Los_Angeles  # Use your own timezone
      PUID: 1026  # Use your own
      PGID: 100  # Use your own
      MAX_WORKERS: 1
      WEB_CONCURRENCY: 1
      ALLOW_SIGNUP: false # true while creating accounts then set to false
      BASE_URL: http://192.168.0.4 # or https://mealie.yourname.domain.me
      DB_ENGINE: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_SERVER: mealie-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: mealie
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: 587
      SMTP_FROM_NAME: Mealie
      SMTP_AUTH_STRATEGY: TLS # Options: TLS, SSL, NONE
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
    restart: on-failure:5
    depends_on:
      db:
        condition: service_healthy
    networks:
      - group1

networks:
  group1:
    external: true  # Use an existing network