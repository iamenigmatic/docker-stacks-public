services:
  swiish:
    image: ghcr.io/mrcrin/swiish:latest
    container_name: swiish
    restart: on-failure:5
    ports:
      - "8092:3000"
    volumes:
      - /volume1/docker/swiish/data:/app/data
      - /volume1/docker/swiish/uploads:/app/uploads
    environment:
      # --- REQUIRED ---
      - JWT_SECRET=${JWT_SECRET}

      # --- OPTIONAL ---
      - NODE_ENV=production
      - APP_URL=${APP_URL}
    networks:
      - group1

networks:
  group1:
    external: true  # Use an existing network