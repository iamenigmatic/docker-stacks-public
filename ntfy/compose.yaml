services:
  ntfy:
    image: binwiederhier/ntfy
    container_name: NTFY
    command:
      - serve
    environment:
      - TZ=America/Los_Angeles  # Use your timezone
    volumes:
      - /volume1/docker/ntfy/cache:/var/cache/ntfy:rw
      - /volume1/docker/ntfy:/etc/ntfy:rw
    healthcheck:
        test: ["CMD-SHELL", "wget -q --tries=1 http://localhost:80/v1/health -O - | grep -Eo '\"healthy\"\\s*:\\s*true' || exit 1"]
        interval: 60s
        timeout: 10s
        retries: 3
        start_period: 40s
    ports:
      - 6742:80
    restart: on-failure:5
    networks:
      - group1

networks:
  group1:
    external: true  # Use an existing network